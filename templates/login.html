<!DOCTYPE html>
<html>
<head>
    <title>Student Enrollment Web App</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="login-page">

    <div class="login-card">

        <h1>Student Enrollment Web App</h1>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST">

            <input
                type="text"
                name="username"
                placeholder="Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <div class="demo-info">

            <strong>Demo Logins</strong>

            <p>
                Student:
                student / student
            </p>

            <p>
                Teacher:
                teacher / teacher
            </p>

            <p>
                Admin:
                admin / admin
            </p>

        </div>

    </div>

</div>

</body>
</html>
